spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: refnote
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:refnote-default-jwt-secret-key-for-local-dev-must-be-256-bits}
  access-expiration: 1800000
  refresh-expiration: 604800000
