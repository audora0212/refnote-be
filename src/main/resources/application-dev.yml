spring:
  datasource:
    url: jdbc:mysql://localhost:3306/refnote?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: false

cloud:
  aws:
    s3:
      bucket: refnote-dev
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY:localkey}
      secret-key: ${AWS_SECRET_KEY:localsecret}

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-haiku-4-5-20250401

logging:
  level:
    com.refnote: DEBUG
    org.hibernate.SQL: DEBUG
