spring:
  datasource:
    url: jdbc:mysql://localhost:3306/refnote?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: refnote
    password: refnote1234
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
  flyway:
    enabled: true

file:
  upload-dir: ./uploads

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: claude-haiku-4-5-20251001

logging:
  level:
    com.refnote: INFO
