spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 1800000
  refresh-expiration: 604800000

file:
  upload-dir: ./test-uploads

claude:
  api-key: test-key
  model: test-model

logging:
  level:
    com.refnote: DEBUG
